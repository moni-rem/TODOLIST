<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todolist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

      <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    

</head>
<body>
      <div class="box">
    <h2>To-Do List</h2>
    <p id="timeTicker" class="time-ticker"></p>

    <div class="row">
      <input id="taskInput" type="text" placeholder="Type a task..." />
      <select id="taskPeriod">
        <option value="Morning">Morning</option>
        <option value="Afternoon">Afternoon</option>
        <option value="Evening">Evening</option>
        <option value="Night">Night</option>
      </select>
      <button class="add" id="addBtn">Add</button>
    </div>

    <div id="taskGroups"></div>

    <button class="clear" id="clearAll">Clear All</button>
  </div>

    <script src="index.js"></script>

</body>
</html>
